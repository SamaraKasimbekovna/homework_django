<h1>Анкеты</h1>

<a href="{% url 'questionnaire:create' %}">Создать анкету</a>

<ul>
    {% for q in questionnaires %}
        <li>
            {{ q.name }} - {{ q.birth_date }}

            <a href="{% url 'questionnaire:update' q.id %}">Редактировать</a>
            <a href="{% url 'questionnaire:delete' q.id %}">Удалить</a>

            <p>Просмотры: {{ q.views }}</p>

            <a href="{% url 'questionnaire:detail' q.id %}">Открыть</a>
        </li>
    {% endfor %}
</ul>
