<h1>{{ book.title }}</h1>

<p><b>Автор:</b> {{ book.author }}</p>
<p><b>Жанр:</b> {{ book.genre }}</p>
<p><b>Страниц:</b> {{ book.pages }}</p>
<p><b>Рейтинг:</b> {{ book.rating }}</p>
<p><b>Дата добавления:</b> {{ book.created_at }}</p>

<p><b>Описание:</b></p>
<p>{{ book.description }}</p>

<hr>
